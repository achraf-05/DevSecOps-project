# ─────────────────────────────────────────────────────────────────────────────
# Pipeline CI/CD DevSecOps – GitHub Actions
# Réalisé par : Achraf CHERGUI
#
# Jobs :
#   1. build            – Construction de l'image Docker
#   2. lint-dockerfile  – Analyse statique du Dockerfile (Hadolint)
#   3. lint-yaml        – Lint des manifestes YAML Kubernetes (yamllint)
#   4. trivy-deps       – Scan des dépendances Python (Trivy FS)
#   5. trivy-container  – Scan de l'image Docker (Trivy)
#   6. conftest         – Vérification des politiques de sécurité K8s (Rego)
# ─────────────────────────────────────────────────────────────────────────────

name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: devsecops-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 : Build de l'image Docker
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: "[1/6] Build Docker Image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Mise en place de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construction de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sauvegarde de l'image en artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload de l'image Docker
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : Lint du Dockerfile (Hadolint)
  # ───────────────────────────────────────────────────────────────────────────
  lint-dockerfile:
    name: "[2/6] Lint Dockerfile (Hadolint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Analyse du Dockerfile avec Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : Lint des fichiers YAML Kubernetes (yamllint)
  # ───────────────────────────────────────────────────────────────────────────
  lint-yaml:
    name: "[3/6] Lint YAML Kubernetes (yamllint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Lint des manifestes YAML avec yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
          file_or_dir: k8s/
          strict: false

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : Scan des dépendances avec Trivy (filesystem)
  # ───────────────────────────────────────────────────────────────────────────
  trivy-deps:
    name: "[4/6] Trivy – Scan Dépendances"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Trivy – Scan filesystem (affichage tableau)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "0"
          ignore-unfixed: false
          severity: CRITICAL,HIGH,MEDIUM
          vuln-type: library

      - name: Trivy – Scan filesystem (export SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM
          vuln-type: library

      - name: Upload résultats Trivy FS vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : Scan de l'image Docker avec Trivy
  # ───────────────────────────────────────────────────────────────────────────
  trivy-container:
    name: "[5/6] Trivy – Scan Image Docker"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Téléchargement de l'image Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Chargement de l'image Docker
        run: docker load -i image.tar

      - name: Trivy – Scan image Docker (affichage tableau)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "0"
          ignore-unfixed: false
          severity: CRITICAL,HIGH,MEDIUM

      - name: Trivy – Scan image Docker (export SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image-results.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload résultats Trivy image vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-container

      - name: Trivy – Echec si vulnérabilité CRITIQUE détectée
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : Vérification des politiques de sécurité Kubernetes (Conftest/Rego)
  # ───────────────────────────────────────────────────────────────────────────
  conftest:
    name: "[6/6] Conftest – Politique Sécurité K8s"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v6

      - name: Installation de Conftest
        run: |
          CONFTEST_VERSION="0.50.0"
          echo "Installation de Conftest v${CONFTEST_VERSION}..."
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Conftest – Vérification des manifestes Kubernetes
        run: |
          echo "============================================================"
          echo "  Vérification des politiques de sécurité Kubernetes"
          echo "  Politiques : policies/kubernetes.rego"
          echo "  Manifestes : k8s/"
          echo "============================================================"
          conftest test k8s/deployment.yaml k8s/service.yaml \
            --policy policies/ \
            --output stdout \
            --all-namespaces
